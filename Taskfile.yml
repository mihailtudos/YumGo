# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

output: prefixed

env:
  POSTGRES_URL: "postgresql://user:password@localhost:5432/eats"

vars:
  GREETING: Hello, world!

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  gen:
    cmds:
      - go generate ./...
      - task: fmt
      - task: go-mod-tidy

  fmt:
    cmds:
      - go tool gofumpt -l -w .

  go-mod-update:
    desc: Update Go module dependencies
    cmds:
      - go get -u ./...

  go-mod-tidy:
    desc: Update Go module dependencies
    cmds:
      - go mod tidy
